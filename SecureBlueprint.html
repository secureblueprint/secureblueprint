<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureBlueprint</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:#0f2240; --navy-mid:#1e3a5f; --navy-light:#2a4f7c;
    --cyan:#0ea5e9; --cyan-light:#38bdf8;
    --bg:#f0f4f8; --white:#ffffff;
    --text-dark:#0f2240; --text-mid:#4a6080; --text-light:#8899aa;
    --border:#d0dcea;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;color:var(--text-dark);}
  .header{background:var(--navy);padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(15,34,64,0.3);}
  .logo{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:22px;color:#fff;letter-spacing:-0.5px;display:flex;align-items:center;gap:10px;}
  .logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--cyan),var(--cyan-light));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
  .logo span{color:var(--cyan-light);}
  .arch-selector-wrap{display:flex;align-items:center;gap:8px;}
  .arch-label{font-size:12px;color:rgba(255,255,255,0.5);font-weight:500;text-transform:uppercase;letter-spacing:0.5px;}
  .arch-select{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:white;padding:6px 12px;border-radius:6px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;outline:none;}
  .arch-select option{background:var(--navy);color:white;}
  .progress-wrap{background:var(--navy-mid);padding:12px 40px;display:flex;align-items:center;gap:16px;}
  .progress-bar-bg{flex:1;height:4px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden;}
  .progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--cyan-light));border-radius:4px;transition:width 0.4s ease;}
  .progress-text{font-size:12px;color:rgba(255,255,255,0.5);white-space:nowrap;font-weight:500;}
  .step-dots{display:flex;gap:4px;align-items:center;}
  .step-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.15);transition:all 0.3s;}
  .step-dot.done{background:var(--cyan);}
  .step-dot.active{background:var(--cyan-light);width:18px;border-radius:3px;}
  .main{max-width:1200px;margin:0 auto;padding:32px 24px;display:grid;grid-template-columns:1fr 340px;gap:24px;align-items:start;}
  .main.summary-layout{grid-template-columns:1fr;}
  .card{background:var(--white);border-radius:16px;box-shadow:0 4px 24px rgba(15,34,64,0.08);overflow:hidden;}
  .card-header{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-mid) 100%);padding:28px 32px;position:relative;overflow:hidden;}
  .card-header::before{content:'';position:absolute;right:-20px;top:-20px;width:120px;height:120px;border-radius:50%;background:rgba(14,165,233,0.1);}
  .step-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(14,165,233,0.2);border:1px solid rgba(14,165,233,0.3);color:var(--cyan-light);padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px;}
  .card-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:24px;font-weight:700;color:white;line-height:1.3;position:relative;z-index:1;}
  .card-desc{color:rgba(255,255,255,0.6);font-size:14px;margin-top:6px;position:relative;z-index:1;}
  .card-body{padding:28px 32px;}

  /* FIELDS */
  .field-group{margin-bottom:20px;}
  .field-group.greyed{opacity:0.5;position:relative;}.field-group.greyed .field-label{color:var(--text-light);}.field-group.greyed .field-select,.field-group.greyed .field-input,.field-group.greyed .field-textarea,.field-group.greyed .multi-select{pointer-events:none;}
  .field-label{display:block;font-size:13px;font-weight:600;color:var(--text-dark);margin-bottom:7px;text-transform:uppercase;letter-spacing:0.4px;}
  .field-input,.field-select,.field-textarea{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:11px 14px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text-dark);background:#fafcff;outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
  .field-input:focus,.field-select:focus,.field-textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(14,165,233,0.1);background:white;}
  .field-textarea{height:90px;resize:vertical;}
  .not-applicable-note{display:flex;align-items:flex-start;gap:8px;background:linear-gradient(135deg,#fff8e6,#fff3d6);border:1px solid #f59e0b;border-radius:8px;padding:10px 14px;font-size:12px;color:#92400e;margin-top:8px;line-height:1.5;}

  /* MULTI SELECT */
  .multi-select{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;}
  .multi-option{display:flex;align-items:center;gap:6px;background:#f0f4f8;border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;cursor:pointer;transition:all 0.2s;font-size:13px;color:var(--text-mid);font-weight:500;user-select:none;}
  .multi-option:hover{border-color:var(--cyan);background:#e8f4fd;}
  .multi-option.selected{background:rgba(14,165,233,0.1);border-color:var(--cyan);color:var(--navy);}
  .multi-check{width:16px;height:16px;border-radius:4px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;transition:all 0.2s;flex-shrink:0;}
  .multi-option.selected .multi-check{background:var(--cyan);border-color:var(--cyan);color:white;}

  /* BUTTONS */
  .btn-row{display:flex;justify-content:space-between;align-items:center;margin-top:28px;padding-top:20px;border-top:1px solid var(--border);}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 22px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
  .btn-primary{background:linear-gradient(135deg,var(--navy-mid),var(--navy-light));color:white;box-shadow:0 2px 8px rgba(30,58,95,0.3);}
  .btn-primary:hover{transform:translateY(-1px);}
  .btn-secondary{background:#eef2f7;color:var(--text-mid);}
  .btn-secondary:hover{background:#e2e8f0;}
  .btn-secondary:disabled{opacity:0.4;cursor:not-allowed;}
  .btn-reset{background:#fff0f0;color:#dc2626;}
  .btn-reset:hover{background:#ffe4e4;}
  .btn-download{background:linear-gradient(135deg,#16a34a,#22c55e);color:white;}
  .btn-download:hover{transform:translateY(-1px);}
  .btn-pdf{background:linear-gradient(135deg,#dc2626,#ef4444);color:white;}
  .btn-pdf:hover{transform:translateY(-1px);}

  /* SIDEBAR */
  .sidebar{background:var(--white);border-radius:16px;box-shadow:0 4px 24px rgba(15,34,64,0.08);overflow:hidden;position:sticky;top:110px;max-height:calc(100vh - 130px);display:flex;flex-direction:column;}
  .sidebar-header{background:linear-gradient(135deg,var(--navy-light),var(--navy-mid));padding:14px 20px;flex-shrink:0;}
  .sidebar-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:700;color:white;text-transform:uppercase;letter-spacing:0.5px;}
  .sidebar-arch-badge{display:inline-block;background:rgba(14,165,233,0.25);color:var(--cyan-light);font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;margin-top:4px;}
  .sidebar-body{padding:14px 18px;overflow-y:auto;flex:1;}
  .sidebar-body::-webkit-scrollbar{width:4px;}
  .sidebar-body::-webkit-scrollbar-track{background:transparent;}
  .sidebar-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  .sidebar-section{margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border);}
  .sidebar-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
  .sidebar-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--cyan);margin-bottom:8px;}
  .sidebar-why{font-size:12px;color:var(--text-mid);line-height:1.5;}
  .arch-tip{background:rgba(14,165,233,0.07);border-left:3px solid var(--cyan);padding:7px 10px;border-radius:0 6px 6px 0;font-size:12px;color:var(--text-mid);line-height:1.5;margin-top:4px;}

  /* SIDEBAR FIELD GUIDE */
  .field-guide-item{margin-bottom:12px;padding-bottom:12px;border-bottom:1px dashed #e8eef5;}
  .field-guide-item:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
  .field-guide-name{font-size:11px;font-weight:700;color:var(--navy-mid);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:4px;}
  .field-guide-desc{font-size:11px;color:var(--text-mid);line-height:1.55;}
  .field-guide-options{margin-top:7px;display:flex;flex-direction:column;gap:5px;}
  .field-guide-option{display:flex;flex-direction:column;gap:1px;padding:4px 7px;background:#f8fafc;border-radius:5px;border-left:2px solid var(--border);}
  .field-guide-option-name{font-size:10px;font-weight:700;color:var(--navy);}
  .field-guide-option-desc{font-size:10px;color:var(--text-mid);line-height:1.45;}

  /* SUMMARY */
  .summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;}
  .summary-section{background:#f8fafc;border:1px solid var(--border);border-radius:12px;overflow:hidden;}
  .summary-section-header{background:var(--navy);padding:10px 16px;display:flex;align-items:center;gap:8px;}
  .summary-section-icon{width:24px;height:24px;background:rgba(14,165,233,0.2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;}
  .summary-section-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;color:white;text-transform:uppercase;letter-spacing:0.5px;}
  .summary-section-body{padding:12px 16px;}
  .summary-row{display:flex;justify-content:space-between;align-items:flex-start;padding:5px 0;border-bottom:1px solid var(--border);gap:12px;}
  .summary-row:last-child{border-bottom:none;}
  .summary-key{font-size:11px;font-weight:600;color:var(--text-light);text-transform:uppercase;letter-spacing:0.3px;white-space:nowrap;flex-shrink:0;}
  .summary-val{font-size:12px;color:var(--text-dark);font-weight:500;text-align:right;}
  .summary-val.notes{font-size:11px;color:var(--text-mid);font-style:italic;font-weight:400;}
  .modal-overlay{position:fixed;inset:0;background:rgba(15,34,64,0.6);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px);}
  .modal{background:white;border-radius:16px;padding:32px;max-width:420px;width:90%;box-shadow:0 20px 60px rgba(15,34,64,0.3);}
  .modal-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:20px;font-weight:700;color:var(--text-dark);margin-bottom:12px;}
  .modal-text{font-size:14px;color:var(--text-mid);line-height:1.6;margin-bottom:24px;}
  .modal-buttons{display:flex;gap:12px;justify-content:flex-end;}
  .summary-banner{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-light) 100%);border-radius:16px;padding:32px;margin-bottom:24px;position:relative;overflow:hidden;}
  .summary-banner::before{content:'';position:absolute;right:-40px;top:-40px;width:200px;height:200px;border-radius:50%;background:rgba(14,165,233,0.08);}
  .summary-banner-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:28px;font-weight:800;color:white;position:relative;z-index:1;}
  .summary-banner-sub{color:rgba(255,255,255,0.6);font-size:14px;margin-top:6px;position:relative;z-index:1;}
  .summary-banner-actions{display:flex;gap:12px;margin-top:20px;position:relative;z-index:1;flex-wrap:wrap;}
  .tag{display:inline-flex;align-items:center;gap:4px;background:rgba(14,165,233,0.15);border:1px solid rgba(14,165,233,0.25);color:var(--cyan-light);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}
  .client-input-wrap{margin-bottom:24px;background:white;border-radius:12px;padding:20px 24px;border:1.5px solid var(--border);display:flex;align-items:center;gap:16px;}
  .client-input-label{font-size:13px;font-weight:700;color:var(--text-dark);text-transform:uppercase;letter-spacing:0.4px;white-space:nowrap;}
  .client-hint{font-size:12px;color:var(--text-light);margin-top:3px;}
  .client-input{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text-dark);background:#fafcff;outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
  .client-input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(14,165,233,0.1);background:white;}
  @keyframes pulse{0%,100%{opacity:0.3;transform:scale(0.8);}50%{opacity:1;transform:scale(1.2);}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/javascript">
// Full field guide per step — what each field and its options mean
window.FIELD_GUIDE = {
  tm1: [
    {key:"tm_goal", name:"System Purpose", desc:"Describe what this system does in plain English. This sets the context for all security decisions that follow."},
    {key:"tm_users", name:"Who Uses It", desc:"Select everyone who will interact with this system.", options:[
      {name:"Internal staff", desc:"Employees inside your organisation."},
      {name:"External customers", desc:"Members of the public or paying customers."},
      {name:"Partners / suppliers", desc:"Third parties with controlled access."},
      {name:"Admins only", desc:"Only privileged internal users — no public access."},
      {name:"Public (unauthenticated)", desc:"Anyone can access without logging in."},
      {name:"Third-party systems", desc:"Automated systems or APIs connecting to yours."}
    ]},
    {key:"tm_value", name:"What Needs Protecting", desc:"Select everything that has value and must be protected from theft, damage, or loss.", options:[
      {name:"Personal data (PII)", desc:"Names, emails, addresses — covered by GDPR."},
      {name:"Financial data", desc:"Bank details, payment info, transactions."},
      {name:"Health data", desc:"Medical records — covered by HIPAA or similar."},
      {name:"Intellectual property", desc:"Source code, algorithms, trade secrets."},
      {name:"Business logic", desc:"The rules and processes that make your system work."},
      {name:"System availability", desc:"The system must stay online — downtime has a cost."},
      {name:"Authentication credentials", desc:"Passwords, tokens, API keys."},
      {name:"API keys / secrets", desc:"Keys that give access to external services."}
    ]}
  ],
  tm2: [
    {key:"tm_weak", name:"Weak Spots", desc:"Where could an attacker get in? Select all areas that could be targeted.", options:[
      {name:"Login / authentication", desc:"Attackers try to bypass or brute-force login."},
      {name:"API endpoints", desc:"APIs that accept data from outside are common targets."},
      {name:"User input fields", desc:"Forms and search boxes can be used for injection attacks."},
      {name:"Third-party integrations", desc:"External services you connect to can be compromised."},
      {name:"Database access", desc:"Direct DB access can expose all data at once."},
      {name:"File uploads", desc:"Uploading malicious files is a common attack vector."},
      {name:"Admin interfaces", desc:"High-privilege areas are high-value targets."},
      {name:"Network boundaries", desc:"Where your network meets the internet or other networks."},
      {name:"Mobile app", desc:"Client-side apps can be decompiled or intercepted."},
      {name:"Browser client", desc:"JavaScript running in browsers can be manipulated."}
    ]},
    {key:"tm_threats", name:"Threat Types (STRIDE)", desc:"STRIDE is a framework for categorising types of attack. Select all that apply.", options:[
      {name:"Spoofing", desc:"Attacker pretends to be someone else — fake identity or credentials."},
      {name:"Tampering", desc:"Attacker modifies data in transit or in storage."},
      {name:"Repudiation", desc:"User denies performing an action — no audit trail to prove it."},
      {name:"Information Disclosure", desc:"Sensitive data is exposed to unauthorised parties."},
      {name:"Denial of Service", desc:"Attacker overwhelms the system to make it unavailable."},
      {name:"Elevation of Privilege", desc:"Attacker gains higher access than they should have."}
    ]}
  ],
  archStyle: [
    {key:"arch", name:"Architecture Style", desc:"The overall design pattern for the system. This affects every other security decision.", options:[
      {name:"Monolith", desc:"One single application — all features in one codebase and one deployment. Simpler to secure but a single point of failure."},
      {name:"Microservices", desc:"Many small independent services — each doing one job. More complex to secure but more resilient."},
      {name:"Serverless", desc:"Code runs as individual functions triggered by events. No servers to manage — cloud provider handles infrastructure."},
      {name:"Hybrid", desc:"A mix — usually legacy on-premise systems combined with new cloud services."}
    ]},
    {key:"hosting", name:"Hosting", desc:"Where the system physically runs. This affects compliance, data residency, and what security tools are available.", options:[
      {name:"AWS", desc:"Amazon Web Services — most widely used cloud platform."},
      {name:"Azure", desc:"Microsoft's cloud — common in enterprise and government."},
      {name:"Google Cloud", desc:"Google's cloud — strong in data and AI workloads."},
      {name:"On-premise", desc:"Runs on your own servers in your own data centre."},
      {name:"Multi-cloud", desc:"Spread across two or more cloud providers."},
      {name:"Hybrid", desc:"Some on-premise, some in the cloud."}
    ]}
  ],
  identity: [
    {key:"user_store", name:"User Store", desc:"Where user accounts and credentials are stored and managed.", options:[
      {name:"Active Directory (AD)", desc:"Microsoft's on-premise directory — common in corporate environments."},
      {name:"Okta", desc:"Cloud identity provider — handles login, MFA, and SSO."},
      {name:"AWS Cognito", desc:"Amazon's managed identity service for web and mobile apps."},
      {name:"Auth0", desc:"Developer-friendly cloud identity platform."},
      {name:"Database (custom)", desc:"User accounts stored directly in your own database — requires careful security."},
      {name:"Azure AD", desc:"Microsoft's cloud directory — used with Microsoft 365 and Azure."}
    ]},
    {key:"auth_engine", name:"Auth Method", desc:"The protocol used to authenticate users and issue access.", options:[
      {name:"OAuth2", desc:"Industry standard for authorisation — issues access tokens. Used by Google, Facebook, GitHub login."},
      {name:"OIDC", desc:"OpenID Connect — built on OAuth2, adds identity (who you are). Best choice for modern apps."},
      {name:"SAML", desc:"Older enterprise SSO standard — common with corporate identity providers."},
      {name:"Custom", desc:"Homemade authentication — higher risk, avoid unless necessary."}
    ]},
    {key:"token", name:"Token Type", desc:"The format used to prove identity after login.", options:[
      {name:"JWT Access Token", desc:"Short-lived token (minutes) — proves who you are. Expires quickly for security."},
      {name:"JWT + Refresh Token", desc:"Access token + long-lived refresh token to get new access tokens without re-login. Best practice."},
      {name:"mTLS", desc:"Certificate-based — both sides prove identity. Used for machine-to-machine, not human logins."},
      {name:"Session cookie", desc:"Traditional server-side session — server remembers who you are. Common in older apps."}
    ]},
    {key:"mfa", name:"MFA", desc:"Multi-Factor Authentication — requires a second proof of identity beyond just a password.", options:[
      {name:"Yes – mandatory", desc:"All users must use MFA. Strongest security — recommended."},
      {name:"Yes – optional", desc:"Users can choose to enable MFA. Better than nothing but weaker."},
      {name:"No", desc:"Password only. Significantly higher risk of account takeover."}
    ]}
  ],
  authz: [
    {key:"rbac", name:"User Roles", desc:"The different types of users in the system and what level of access they have.", options:[
      {name:"Admin", desc:"Full access — can manage the system, users, and all data."},
      {name:"Manager", desc:"Elevated access — can approve actions and see more data than standard users."},
      {name:"Standard user", desc:"Normal user — can use the system within their own scope."},
      {name:"Read-only user", desc:"Can view data but cannot create, edit, or delete anything."},
      {name:"Guest / public", desc:"Unauthenticated or minimal access — limited to public features."},
      {name:"API service account", desc:"Non-human account used by automated systems or integrations."},
      {name:"Support agent", desc:"Customer support staff — can view user data to help customers."},
      {name:"Auditor", desc:"Compliance or audit role — read-only access to logs and records."}
    ]},
    {key:"action_auth", name:"Permission Controls", desc:"Which actions in the system need to be controlled — only certain roles should be able to do these.", options:[
      {name:"Create records", desc:"Adding new data — should be restricted to appropriate roles."},
      {name:"Delete records", desc:"Permanent deletion — should require elevated permission."},
      {name:"Approve / reject", desc:"Workflow decisions — often requires manager or admin role."},
      {name:"Export data", desc:"Bulk data export is high risk — must be tightly controlled."},
      {name:"Manage users", desc:"Creating, editing, or deleting user accounts."},
      {name:"View reports", desc:"Access to aggregated or sensitive business data."},
      {name:"Access admin panel", desc:"The admin interface — strictly admin only."},
      {name:"Make payments", desc:"Any financial transaction — must be tightly controlled."},
      {name:"Change settings", desc:"System configuration — admin or manager only."}
    ]},
    {key:"data_auth", name:"Data Access Model", desc:"How data visibility is controlled — what data can different users see?", options:[
      {name:"Own records only", desc:"Users can only see their own data. Strictest model."},
      {name:"Department / team data", desc:"Users see data belonging to their team or department."},
      {name:"Role-based data access", desc:"Different roles see different data — configured per role."},
      {name:"All data (admin only)", desc:"Only admins see everything — all other users are restricted."},
      {name:"Field-level masking", desc:"Sensitive fields (e.g. card numbers) are hidden or masked even for authorised users."}
    ]}
  ],
  comms: [
    {key:"tls", name:"TLS Version", desc:"TLS (Transport Layer Security) encrypts data as it travels between systems — what you see as HTTPS.", options:[
      {name:"TLS 1.3", desc:"Latest version — fastest and most secure. Recommended for all new systems."},
      {name:"TLS 1.2", desc:"Still acceptable but older. Some compliance frameworks require 1.2 minimum."},
      {name:"Both 1.2 and 1.3", desc:"Supports both for compatibility with older clients."}
    ]},
    {key:"mtls", name:"mTLS", desc:"Mutual TLS — both the client AND the server prove their identity with certificates. Used between services, not for human logins.", options:[
      {name:"Yes", desc:"Both sides authenticate — strongest service-to-service security. Recommended for Microservices."},
      {name:"No", desc:"One-way TLS only — server proves identity but client does not."},
      {name:"Not applicable", desc:"This architecture does not have service-to-service communication."}
    ]},
    {key:"api_gateway", name:"API Gateway", desc:"A central entry point that sits in front of your APIs — handles routing, authentication, rate limiting, and TLS.", options:[
      {name:"Yes", desc:"All API traffic goes through a gateway. Recommended — adds a security layer."},
      {name:"No", desc:"APIs are exposed directly — more surface area to secure."},
      {name:"Planned", desc:"Not yet in place but on the roadmap."}
    ]}
  ],
  code: [

function MultiSelect({options, value, onChange}) {
  const selected = (value && typeof value === 'string' && value.trim()) ? value.split("|").filter(Boolean) : [];
  const handleChange = (opt, checked) => {
    const next = checked ? [...selected, opt] : selected.filter(s=>s!==opt);
    onChange(next.join("|"));
  };
  return (
    <div className="multi-select">
      {options.map(opt=>{
        const isSelected = selected.includes(opt);
        return (
          <label key={opt} className={`multi-option ${isSelected?'selected':''}`} style={{cursor:'pointer'}}>
            <input
              type="checkbox"
              checked={isSelected}
              onChange={e=>handleChange(opt, e.target.checked)}
              style={{position:'absolute',opacity:0,width:0,height:0}}
            />
            <div className="multi-check">{isSelected?'✓':''}</div>
            {opt}
          </label>
        );
      })}
    </div>
  );
}

              <div style={{fontFamily:'Plus Jakarta Sans,sans-serif',fontSize:'16px',fontWeight:'700',color:'white'}}>AI Security Review</div>
            </div>
            <div style={{fontSize:'12px',color:'rgba(255,255,255,0.55)',lineHeight:'1.5',maxWidth:'400px'}}>
              Analyses your architecture decisions and flags risks, inconsistencies, and recommendations. Your client name is never sent.
            </div>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:'8px',alignItems:'flex-end'}}>
            {showKeyInput && !aiResult && (
              <div style={{display:'flex',gap:'8px',alignItems:'center',flexWrap:'wrap',justifyContent:'flex-end'}}>
                <input
                  type="password"
                  placeholder="Paste licence key..."
                  value={licenceKey}
                  onChange={e=>setLicenceKey(e.target.value)}
                  style={{border:'1px solid rgba(255,255,255,0.2)',background:'rgba(255,255,255,0.08)',color:'white',padding:'8px 12px',borderRadius:'7px',fontSize:'13px',fontFamily:'DM Sans,sans-serif',outline:'none',width:'240px'}}
                />
              </div>
            )}
            <div style={{fontSize:'11px',color:'rgba(255,255,255,0.4)',textAlign:'right',maxWidth:'280px',lineHeight:'1.5',marginBottom:'4px'}}>
              🔒 Client name and notes fields are excluded before sending to AI
            </div>
            <button
              onClick={runAiReview}
              disabled={aiLoading}
              style={{background:aiLoading?'rgba(14,165,233,0.3)':'linear-gradient(135deg,#0ea5e9,#38bdf8)',color:'white',border:'none',padding:'10px 20px',borderRadius:'8px',fontSize:'13px',fontWeight:'700',cursor:aiLoading?'not-allowed':'pointer',fontFamily:'DM Sans,sans-serif',display:'flex',alignItems:'center',gap:'8px',whiteSpace:'nowrap'}}
            >
              {aiLoading ? '⏳ Analysing...' : aiResult ? '↺ Run Again' : '✦ Run AI Review'}
            </button>
            {!showKeyInput && !aiResult && (
              <div style={{fontSize:'10px',color:'rgba(255,255,255,0.35)',cursor:'pointer',textDecoration:'underline'}} onClick={()=>setShowKeyInput(true)}>Enter licence key first</div>
            )}
            {usageInfo && (
              <div style={{fontSize:'10px',color:'rgba(255,255,255,0.3)',textAlign:'right'}}>{usageInfo.used}/{usageInfo.limit} reviews used this month</div>
            )}
          </div>
        </div>

        {/* Error */}
        {aiError && (
          <div style={{marginTop:'16px',background:'rgba(220,38,38,0.15)',border:'1px solid rgba(220,38,38,0.3)',borderRadius:'8px',padding:'12px 16px',fontSize:'12px',color:'#fca5a5',position:'relative',zIndex:1}}>
            ⚠️ {aiError}
          </div>
        )}

        {/* Loading state */}
        {aiLoading && (
          <div style={{marginTop:'16px',padding:'20px',textAlign:'center',position:'relative',zIndex:1}}>
            <div style={{fontSize:'13px',color:'rgba(255,255,255,0.5)'}}>Reviewing your security architecture...</div>
            <div style={{display:'flex',justifyContent:'center',gap:'6px',marginTop:'12px'}}>
              {[0,1,2].map(i=><div key={i} style={{width:'8px',height:'8px',borderRadius:'50%',background:'#0ea5e9',animation:`pulse 1.2s ease-in-out ${i*0.2}s infinite`}}></div>)}
            </div>
          </div>
        )}

        {/* AI Results */}
        {aiResult && !aiLoading && (
          <div style={{marginTop:'20px',position:'relative',zIndex:1}}>
            {/* Score + overall */}
            <div style={{display:'flex',alignItems:'center',gap:'16px',marginBottom:'16px',flexWrap:'wrap'}}>
              <div style={{background:'rgba(255,255,255,0.07)',border:'1px solid rgba(255,255,255,0.12)',borderRadius:'12px',padding:'12px 20px',display:'flex',alignItems:'center',gap:'12px'}}>
                <div style={{fontFamily:'Plus Jakarta Sans,sans-serif',fontSize:'32px',fontWeight:'800',color:aiResult.score>=8?'#4ade80':aiResult.score>=5?'#fbbf24':'#f87171',lineHeight:1}}>{aiResult.score}</div>
                <div>
                  <div style={{fontSize:'10px',color:'rgba(255,255,255,0.4)',textTransform:'uppercase',letterSpacing:'0.5px'}}>Security Score</div>
                  <div style={{fontSize:'11px',color:'rgba(255,255,255,0.6)'}}>out of 10</div>
                </div>
              </div>
              <div style={{flex:1,fontSize:'13px',color:'rgba(255,255,255,0.75)',lineHeight:'1.5',fontStyle:'italic'}}>"{aiResult.overall}"</div>
            </div>

            {/* Positives */}
            {aiResult.positives?.length > 0 && (
              <div style={{marginBottom:'14px',background:'rgba(16,185,129,0.1)',border:'1px solid rgba(16,185,129,0.25)',borderRadius:'10px',padding:'12px 16px'}}>
                <div style={{fontSize:'10px',fontWeight:'700',color:'#4ade80',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:'8px'}}>✓ What you're doing well</div>
                {aiResult.positives.map((p,i)=>(
                  <div key={i} style={{fontSize:'12px',color:'rgba(255,255,255,0.7)',marginBottom:'4px',paddingLeft:'8px',borderLeft:'2px solid #4ade80'}}>• {p}</div>
                ))}
              </div>
            )}

            {/* Risks */}
            {aiResult.risks?.length > 0 && (
              <div style={{marginBottom:'14px'}}>
                <div style={{fontSize:'10px',fontWeight:'700',color:'rgba(255,255,255,0.4)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:'8px'}}>⚠ Risks identified</div>
                <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
                  {aiResult.risks.map((r,i)=>{
                    const c=severityColour(r.severity);
                    return (
                      <div key={i} style={{background:'rgba(255,255,255,0.05)',border:`1px solid rgba(255,255,255,0.1)`,borderRadius:'8px',padding:'10px 14px',borderLeft:`3px solid ${c.dot}`}}>
                        <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'4px'}}>
                          <div style={{fontSize:'9px',fontWeight:'700',textTransform:'uppercase',letterSpacing:'0.5px',color:c.dot,background:`${c.dot}22`,padding:'2px 7px',borderRadius:'4px'}}>{r.severity}</div>
                          <div style={{fontSize:'12px',fontWeight:'700',color:'white'}}>{r.title}</div>
                        </div>
                        <div style={{fontSize:'11px',color:'rgba(255,255,255,0.6)',lineHeight:'1.5'}}>{r.detail}</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Recommendations */}
            {aiResult.recommendations?.length > 0 && (
              <div>
                <div style={{fontSize:'10px',fontWeight:'700',color:'rgba(255,255,255,0.4)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:'8px'}}>→ Recommendations</div>
                <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
                  {aiResult.recommendations.map((r,i)=>(
                    <div key={i} style={{background:'rgba(14,165,233,0.08)',border:'1px solid rgba(14,165,233,0.2)',borderRadius:'8px',padding:'10px 14px'}}>
                      <div style={{fontSize:'12px',fontWeight:'700',color:'#38bdf8',marginBottom:'3px'}}>{r.title}</div>
                      <div style={{fontSize:'11px',color:'rgba(255,255,255,0.6)',lineHeight:'1.5'}}>{r.detail}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}
      </div>

      {/* Summary grid */}
      <div className="summary-grid">
        {SECTIONS.map(section=>{
          const hasData=section.keys.some(k=>state[k]);
          if(!hasData) return null;
          return (
            <div key={section.id} className="summary-section">
              <div className="summary-section-header">
                <div className="summary-section-icon">{SECTION_ICONS[section.id]}</div>
                <div className="summary-section-title">{STEP_LABELS[section.id]}</div>
              </div>
              <div className="summary-section-body">
                {section.keys.map(key=>{
                  const value=state[key]; if(!value) return null;
                  const isNote=key.includes("_notes");
                  const label=isNote?"Notes":FIELD_LABELS[key]||key;
                  return <div key={key} className="summary-row"><span className="summary-key">{label}</span><span className={`summary-val ${isNote?'notes':''}`}>{value}</span></div>;
                })}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

    backup:"Yes – automated and tested", rto:"1–4 hours", rpo:"1–4 hours",
    dr_plan:"Yes – tested regularly", ha:"Yes – multi-zone",
    data_residency_compliance:"No specific requirement", audit_logging:"Yes – full audit trail"
  };

  const [state, setState] = useState(defaultState);
  const [stepIndex, setStepIndex] = useState(0);
  const [showResetModal, setShowResetModal] = useState(false);
  const [clientName, setClientName] = useState('');
  const current = steps[stepIndex];
  const totalSteps = steps.length;
  const progressPct = Math.round((stepIndex / (totalSteps - 1)) * 100);
  const arch = state.arch || "Monolith";

  const updateField = (k,v) => setState(p=>({...p,[k]:v}));
  const next = () => setStepIndex(i=>Math.min(i+1,totalSteps-1));
  const back = () => setStepIndex(i=>Math.max(i-1,0));
  const doReset = () => { setState(defaultState); setStepIndex(0); setShowResetModal(false); setClientName(''); };
  const handleClientName = useCallback(e=>setClientName(e.target.value),[]);

  // Check if a field is N/A for current architecture
  function getArchNA(field) {
    if (!field.archNA) return null;
    return field.archNA[arch] || null;
  }

  function renderField(f) {
    const naReason = getArchNA(f);
    const isGreyed = !!naReason;
    return (
      <div className={`field-group ${isGreyed?'greyed':''}`}>
        <label className="field-label">{f.label}</label>
        {f.type==='text' && <input className="field-input" value={state[f.key]||''} onChange={e=>updateField(f.key,e.target.value)} placeholder={f.placeholder||''}/>}
        {f.type==='textarea' && <textarea className="field-textarea" value={state[f.key]||''} onChange={e=>updateField(f.key,e.target.value)} placeholder={f.placeholder||''}/>}
        {f.type==='select' && <select className="field-select" value={state[f.key]||''} onChange={e=>updateField(f.key,e.target.value)}>{f.options.map(o=><option key={o} value={o}>{o}</option>)}</select>}
        {f.type==='multiselect' && <MultiSelect options={f.options} value={state[f.key]||''} onChange={v=>updateField(f.key,v)} key={f.key}/>}
        {isGreyed && (
          <div className="not-applicable-note">
            <span style={{fontSize:'16px',flexShrink:0}}>⚠️</span>
            <div>
              <div style={{fontWeight:'700',marginBottom:'2px'}}>Not applicable for {arch} architecture</div>
              <div>{naReason}</div>
            </div>
          </div>
        )}
      </div>
    );
  }

  function downloadPDF() {
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const pageW=210,pageH=297,margin=20,contentW=pageW-margin*2;
    let y=0;
    doc.setFillColor(15,34,64); doc.rect(0,0,pageW,pageH,'F');
    doc.setFillColor(14,165,233); doc.rect(0,0,6,pageH,'F');
    doc.setFillColor(30,58,95); doc.circle(185,55,55,'F');
    doc.setFillColor(42,79,124); doc.circle(175,80,32,'F');
    doc.setFillColor(14,165,233); doc.roundedRect(20,38,14,14,3,3,'F');
    doc.setTextColor(255,255,255); doc.setFontSize(9); doc.setFont('helvetica','bold');
    doc.text('SB',27,47,{align:'center'});
    doc.setFontSize(26); doc.setTextColor(255,255,255); doc.setFont('helvetica','bold');
    doc.text('Secure',38,50); doc.setTextColor(56,189,248); doc.text('Blueprint',71,50);
    doc.setFontSize(10); doc.setTextColor(148,163,184); doc.setFont('helvetica','normal');
    doc.text('Security Architecture Assessment',38,58);
    doc.setDrawColor(14,165,233); doc.setLineWidth(0.4); doc.line(20,68,190,68);
    doc.setFontSize(22); doc.setTextColor(255,255,255); doc.setFont('helvetica','bold');
    doc.text('Security Architecture',20,90); doc.text('Summary Report',20,103);
    let infoY=122;
    if(clientName){
      doc.setFontSize(10); doc.setTextColor(56,189,248); doc.setFont('helvetica','normal');
      doc.text('Prepared for:',20,infoY);
      doc.setFontSize(15); doc.setTextColor(255,255,255); doc.setFont('helvetica','bold');
      doc.text(clientName,20,infoY+9); infoY+=22;
    }
    const dateStr=new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric'});
    doc.setFontSize(10); doc.setTextColor(56,189,248); doc.setFont('helvetica','normal');
    doc.text('Date Generated:',20,infoY);
    doc.setFontSize(12); doc.setTextColor(255,255,255); doc.setFont('helvetica','bold');
    doc.text(dateStr,20,infoY+8);
    doc.setFillColor(30,58,95); doc.roundedRect(20,infoY+20,65,11,3,3,'F');
    doc.setFontSize(9); doc.setTextColor(56,189,248); doc.setFont('helvetica','normal');
    doc.text('Architecture: '+(state.arch||'Not specified'),52.5,infoY+27,{align:'center'});
    doc.setFontSize(8); doc.setTextColor(71,85,105);
    doc.text('Generated by SecureBlueprint  |  Confidential',pageW/2,285,{align:'center'});
    const addPage=()=>{
      doc.addPage();
      doc.setFillColor(15,34,64); doc.rect(0,0,pageW,14,'F');
      doc.setFillColor(14,165,233); doc.rect(0,0,4,14,'F');
      doc.setFontSize(7.5); doc.setTextColor(148,163,184); doc.setFont('helvetica','normal');
      doc.text('SecureBlueprint – Security Architecture Summary',10,9);
      if(clientName) doc.text(clientName,pageW-margin,9,{align:'right'});
      doc.setFontSize(7); doc.setTextColor(148,163,184);
      doc.text('Confidential  |  SecureBlueprint',pageW/2,290,{align:'center'});
      doc.text('Page '+doc.internal.getNumberOfPages(),pageW-margin,290,{align:'right'});
      return 24;
    };
    y=addPage();
    doc.setFontSize(17); doc.setTextColor(15,34,64); doc.setFont('helvetica','bold');
    doc.text('Architecture Decisions',margin,y); y+=10;
    SECTIONS.forEach(section=>{
      const hasData=section.keys.some(k=>state[k]); if(!hasData) return;
      if(y>252){y=addPage();}
      doc.setFillColor(15,34,64); doc.roundedRect(margin,y,contentW,9,2,2,'F');
      doc.setFillColor(14,165,233); doc.roundedRect(margin,y,4,9,2,2,'F');
      doc.setFontSize(8.5); doc.setTextColor(255,255,255); doc.setFont('helvetica','bold');
      doc.text(STEP_LABELS[section.id],margin+7,y+6); y+=13;
      section.keys.forEach(key=>{
        const value=state[key]; if(!value) return;
        if(y>270){y=addPage();}
        const isNote=key.includes('_notes');
        const label=isNote?'Notes':(FIELD_LABELS[key]||key);
        doc.setFillColor(248,250,252); doc.rect(margin,y-1,contentW,8,'F');
        doc.setFontSize(7.5); doc.setTextColor(136,153,170); doc.setFont('helvetica','bold');
        doc.text(label.toUpperCase(),margin+3,y+4.5);
        doc.setTextColor(15,34,64); doc.setFont('helvetica',isNote?'italic':'normal');
        const lines=doc.splitTextToSize(value,95);
        doc.text(lines,pageW-margin-2,y+4.5,{align:'right'});
        y+=lines.length>1?lines.length*5+3:9;
      });
      y+=5;
    });
    doc.save('secureblueprint-report.pdf');
  }

  function downloadTxt() {
    let text="SECUREBLUEPRINT – SECURITY ARCHITECTURE SUMMARY\n"+"=".repeat(50)+"\n";
    if(clientName) text+=`Client: ${clientName}\n`;
    text+=`Date: ${new Date().toLocaleDateString('en-GB')}\nArchitecture: ${state.arch||'Not specified'}\n\n`;
    SECTIONS.forEach(section=>{
      text+=STEP_LABELS[section.id]+"\n"+"-".repeat(40)+"\n";
      section.keys.forEach(key=>{const v=state[key];if(v)text+=`${key.includes("_notes")?"Notes":FIELD_LABELS[key]||key}: ${v}\n`;});
      text+="\n";
    });
    const blob=new Blob([text],{type:'text/plain'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download='secureblueprint-summary.txt'; a.click();
    URL.revokeObjectURL(url);
  }

  function openEmail() {
    let body=`SecureBlueprint – Security Architecture Summary\n\n`;
    if(clientName) body+=`Client: ${clientName}\n`;
    body+=`Date: ${new Date().toLocaleDateString('en-GB')}\nArchitecture: ${state.arch||'Not specified'}\n\n`;
    SECTIONS.forEach(section=>{
      body+=`${STEP_LABELS[section.id]}\n${"-".repeat(40)}\n`;
      section.keys.forEach(key=>{const v=state[key];if(v)body+=`${key.includes("_notes")?"Notes":FIELD_LABELS[key]||key}: ${v}\n`;});
      body+="\n";
    });
    const subject=clientName?`SecureBlueprint – Security Architecture Summary for ${clientName}`:`SecureBlueprint – Security Architecture Summary`;
    window.location.href=`mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  }

  // Sidebar — shows step desc, arch tip, and full field guide
  function Sidebar() {
    const tip = current.archTips && current.archTips[arch];
    const guide = FIELD_GUIDE[current.id] || [];
    return (
      <div className="sidebar">
        <div className="sidebar-header">
          <div className="sidebar-title">Reference Guide</div>
          <div className="sidebar-arch-badge">{arch}</div>
        </div>
        <div className="sidebar-body">

          {/* Why this step matters */}
          <div className="sidebar-section">
            <div className="sidebar-section-title">About this step</div>
            <div className="sidebar-why">{current.desc}</div>
          </div>

          {/* Architecture tip */}
          {tip && (
            <div className="sidebar-section">
              <div className="sidebar-section-title">Tip for {arch}</div>
              <div className="arch-tip">{tip}</div>
            </div>
          )}

          {/* Full field-by-field guide */}
          {guide.length > 0 && (
            <div className="sidebar-section">
              <div className="sidebar-section-title">Field Guide</div>
              {guide.map(item=>(
                <div key={item.key} className="field-guide-item">
                  <div className="field-guide-name">{item.name}</div>
                  <div className="field-guide-desc">{item.desc}</div>
                  {item.options && (
                    <div className="field-guide-options">
                      {item.options.map(opt=>(
                        <div key={opt.name} className="field-guide-option">
                          <span className="field-guide-option-name">{opt.name}</span>
                          <span className="field-guide-option-desc">{opt.desc}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              ))}
            </div>
          )}

        </div>
      </div>
    );
  }

  return (
    <div>
      <div className="header">
        <div className="logo"><div className="logo-icon">🔷</div>Secure<span>Blueprint</span></div>
        {!current.isSummary&&(
          <div className="arch-selector-wrap">
            <span className="arch-label">Architecture</span>
            <select className="arch-select" value={state.arch} onChange={e=>updateField('arch',e.target.value)}>
              <option>Monolith</option><option>Microservices</option><option>Serverless</option><option>Hybrid</option>
            </select>
          </div>
        )}
      </div>

      {!current.isSummary&&(
        <div className="progress-wrap">
          <div className="step-dots">{steps.slice(0,-1).map((_,i)=><div key={i} className={`step-dot ${i<stepIndex?'done':i===stepIndex?'active':''}`}></div>)}</div>
          <div className="progress-bar-bg"><div className="progress-bar-fill" style={{width:`${progressPct}%`}}></div></div>
          <div className="progress-text">Step {stepIndex+1} of {totalSteps-1}</div>
        </div>
      )}

      <div className={`main ${current.isSummary?'summary-layout':''}`}>
        <div className="card">
          {current.isSummary?(
            <div className="card-body">
              <SummaryPage
                state={state}
                clientName={clientName}
                onClientNameChange={handleClientName}
                onReset={()=>setShowResetModal(true)}
                onDownloadPDF={downloadPDF}
                onDownloadTxt={downloadTxt}
                onOpenEmail={openEmail}
              />
            </div>
          ):(
            <>
              <div className="card-header">
                <div className="step-badge">{SECTION_ICONS[current.id]} Step {stepIndex+1}</div>
                <div className="card-title">{current.title}</div>
                <div className="card-desc">{current.desc}</div>
              </div>
              <div className="card-body">
                {current.fields.map(f=>(
                  <div key={f.key}>
                    {renderField(f)}
                  </div>
                ))}
                {/* Step context strip */}
                <div style={{marginTop:'24px',background:'#f8fafc',border:'1px solid var(--border)',borderRadius:'10px',padding:'12px 16px'}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'8px'}}>
                    <div style={{fontSize:'11px',fontWeight:'700',color:'var(--text-light)',textTransform:'uppercase',letterSpacing:'0.5px'}}>Your progress</div>
                    <div style={{fontSize:'11px',color:'var(--text-light)'}}>Step {stepIndex+1} of {totalSteps-1}</div>
                  </div>
                  <div style={{display:'flex',gap:'4px',marginBottom:'10px'}}>
                    {steps.slice(0,-1).map((_,i)=>(
                      <div key={i} style={{flex:1,height:'4px',borderRadius:'2px',background:i<stepIndex?'var(--cyan)':i===stepIndex?'var(--cyan-light)':'var(--border)',transition:'background 0.3s'}}></div>
                    ))}
                  </div>
                  <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:'8px'}}>
                    <div>
                      <div style={{fontSize:'10px',color:'var(--text-light)',textTransform:'uppercase',letterSpacing:'0.4px',marginBottom:'1px'}}>Current</div>
                      <div style={{fontSize:'12px',fontWeight:'600',color:'var(--navy)'}}>{SECTION_ICONS[current.id]} {current.title}</div>
                    </div>
                    {stepIndex < totalSteps-2 && (
                      <div style={{textAlign:'right'}}>
                        <div style={{fontSize:'10px',color:'var(--text-light)',textTransform:'uppercase',letterSpacing:'0.4px',marginBottom:'1px'}}>Next up</div>
                        <div style={{fontSize:'12px',color:'var(--text-mid)'}}>{SECTION_ICONS[steps[stepIndex+1].id]} {steps[stepIndex+1].title}</div>
                        {stepIndex < totalSteps-3 && (
                          <div style={{fontSize:'11px',color:'var(--text-light)',marginTop:'2px'}}>{SECTION_ICONS[steps[stepIndex+2].id]} {steps[stepIndex+2].title}</div>
                        )}
                      </div>
                    )}
                    {stepIndex === totalSteps-2 && (
                      <div style={{textAlign:'right'}}>
                        <div style={{fontSize:'10px',color:'var(--cyan)',textTransform:'uppercase',letterSpacing:'0.4px',fontWeight:'700'}}>Last step</div>
                        <div style={{fontSize:'12px',color:'var(--text-mid)'}}>Then → Summary</div>
                      </div>
                    )}
                  </div>
                </div>
                <div className="btn-row">
                  <button onClick={back} disabled={stepIndex===0} className="btn btn-secondary">← Back</button>
                  <div style={{display:'flex',gap:'8px'}}>
                    <button onClick={()=>setShowResetModal(true)} className="btn btn-reset">↺ Reset</button>
                    <button onClick={next} className="btn btn-primary">{stepIndex===totalSteps-2?'View Summary →':'Next →'}</button>
                  </div>
                </div>
              </div>
            </>
          )}
        </div>
        {!current.isSummary&&<Sidebar/>}
      </div>

      {showResetModal&&(
        <div className="modal-overlay">
          <div className="modal">
            <div className="modal-title">Reset everything?</div>
            <div className="modal-text">This will clear all your entries and take you back to step one. This cannot be undone.</div>
            <div className="modal-buttons">
              <button onClick={()=>setShowResetModal(false)} className="btn btn-secondary">Cancel</button>
              <button onClick={doReset} className="btn" style={{background:'#dc2626',color:'white'}}>Yes, Reset</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<SecureBlueprint/>);
</script>
</body>
</html>
